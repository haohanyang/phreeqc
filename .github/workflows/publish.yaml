name: Publish package to pypi

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Publish destination"
        required: true
        default: "PyPI"
        type: choice
        options:
          - PyPI
          - Test PyPI
      version:
        description: "Version number to publish (optional)"
        required: false
        default: ""

env:
  CIBW_BUILD: ${{ github.event.inputs.repository == 'Test PyPI' && 'cp312-*' || '' }}

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version
        if: ${{ github.event.inputs.version != '' }}
        uses: ./.github/actions/update-version
        with:
          version: ${{ github.event.inputs.version }}

      - name: Build sdist
        run: pipx run build --sdist

      - name: Check metadata
        run: pipx run twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build-linux-x86_64-wheels:
    name: Build wheels on x64 Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Update version
        if: ${{ github.event.inputs.version != '' }}
        uses: ./.github/actions/update-version
        with:
          version: ${{ github.event.inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: linux
          CIBW_ARCHS: x86_64

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ runner.os }}-${{ runner.arch }}
          path: wheelhouse/*.whl

  build-linux-aarch64-wheels:
    name: Build wheels on arm64 Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Update version
        if: ${{ github.event.inputs.version != '' }}
        uses: ./.github/actions/update-version
        with:
          version: ${{ github.event.inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: linux
          CIBW_ARCHS: aarch64

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ runner.os }}-${{ runner.arch }}
          path: wheelhouse/*.whl

  build-windows-amd64-wheels:
    name: Build wheel on x64 Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          build-type: Release

      - name: Update version
        if: ${{ github.event.inputs.version != '' }}
        uses: ./.github/actions/update-version
        with:
          version: ${{ github.event.inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: windows
          CIBW_ARCHS: AMD64

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ runner.os }}-${{ runner.arch }}
          path: wheelhouse/*.whl

  build-macos-arm64-wheels:
    name: Build wheel on arm64 macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          build-type: Release

      - name: Update version
        if: ${{ github.event.inputs.version != '' }}
        uses: ./.github/actions/update-version
        with:
          version: ${{ github.event.inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: macos
          CIBW_ARCHS: arm64

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ runner.os }}-${{ runner.arch }}
          path: wheelhouse/*.whl

  build-macos-x86_64-wheels:
    name: Build wheel on Intel macOS
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          build-type: Release

      - name: Update version
        if: ${{ github.event.inputs.version != '' }}
        uses: ./.github/actions/update-version
        with:
          version: ${{ github.event.inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: macos
          CIBW_ARCHS: x86_64

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ runner.os }}-${{ runner.arch }}
          path: wheelhouse/*.whl
  publish:
    name: Publish wheels to pypi
    runs-on: ubuntu-latest
    needs:
      [
        build-linux-x86_64-wheels,
        build-linux-aarch64-wheels,
        build-windows-amd64-wheels,
        build-macos-x86_64-wheels,
        build-macos-x86_64-wheels,
      ]
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download all dists
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cibw-*
          merge-multiple: true

      - name: Generate artifact attestation for sdist and wheels
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*"

      - name: Publish package to pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ github.event.inputs.repository == 'PyPI' }}
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
          attestations: true

      - name: Publish package to test pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ github.event.inputs.repository == 'Test PyPI' }}
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          verbose: true
          attestations: true
          repository-url: https://test.pypi.org/legacy/
