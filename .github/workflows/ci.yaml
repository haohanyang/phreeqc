name: CI

on:
  push:
    branches:
      - "*"
    paths-ignore:
      - README.md

jobs:
  build:
    name: Build IPhreeqc Python bindings
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          build-type: Release

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/build/Release/generators/conan_toolchain.cmake

      - name: Build phreeqc bindings
        run: cmake --build ${{github.workspace}}/build --config Release

      - name: Test bindings
        run: python test_bin.py
